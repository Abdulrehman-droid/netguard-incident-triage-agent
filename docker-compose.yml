# ─────────────────────────────────────────────────────────────
# NetGuard Incident Triage Agent — Docker Compose
# ─────────────────────────────────────────────────────────────

services:
  netguard:
    build:
      context: .
      args:
        # Override with your own Fireworks AI API key at build time:
        #   VITE_FIREWORKS_API_KEY=fw_yourkey docker compose build
        VITE_FIREWORKS_API_KEY: ${VITE_FIREWORKS_API_KEY:-}
    ports:
      - "${PORT:-8080}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M