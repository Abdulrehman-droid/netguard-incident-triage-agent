# NetGuard Incident Triage Agent — Nginx production config
# Serves the SPA with gzip, caching, and security headers

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://api.fireworks.ai; img-src 'self' data:; base-uri 'self'; form-action 'self';" always;

    # ── Gzip compression ──────────────────────────────────────
    gzip on;
    gzip_comp_level 6;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # ── Static assets with fingerprint (long cache) ──────────
    location ~* \.(?:css|js|mjs|svg|ico|png|jpg|jpeg|gif|webp|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── SPA fallback (everything else → index.html) ──────────
    location / {
        try_files $uri $uri/ /index.html;
        # HTML should not be cached
        add_header Cache-Control "no-cache, must-revalidate";
    }
}